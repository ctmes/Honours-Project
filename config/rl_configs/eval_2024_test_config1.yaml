# ============================================================================
# EVAL CONFIG — Config-1 (baseline) checkpoints on the HELD-OUT 2024_test split.
#
# Used via:  evaluate_seeds(project="v1_config1_baseline",
#                           run_names=["seed_0", ...],
#                           yaml_path="config/rl_configs/eval_2024_test_config1.yaml",
#                           adv_project="v1_config3_full",
#                           adv_run_names=["seed_0", ...])   # common adversary
#
# ENV_CONFIG is deliberately the CONFIG-2 json, not the config-1 training json:
#   - the MM obs channels (detection prob, regime) are zeroed exactly as they
#     were during config-1 training, so the restored network sees the same
#     input distribution it was trained on;
#   - but the Spoofing block is the full adversary (budget 1e6), so the
#     attack-on condition actually attacks — the config-1 TRAINING json pins
#     the telegraph off with zero budget and would make "attack-on" a no-op.
# The attack gate itself is forced per-mode by set_attack_mode at eval time.
# ============================================================================

"LR": [0.0003, 0.0003]
"NUM_ENVS": 16
"NUM_STEPS": 512               # eval horizon default = one full training episode
"GRU_HIDDEN_DIM": 256
"FC_DIM_SIZE": 256
"TOTAL_TIMESTEPS": 8192000
"UPDATE_EPOCHS": 4
"NUM_MINIBATCHES": 4
"GAMMA": [0.999, 0.99]
"GAE_LAMBDA": [0.85, 0.95]
"CLIP_EPS": 0.2
"SCALE_CLIP_EPS": [false, false]
"ENT_COEF": [0.01, 0.01]
"VF_COEF": [0.5, 0.5]
"MAX_GRAD_NORM": [0.5, 0.5]
"ANNEAL_LR": [true, true]
"NUM_AGENTS_PER_TYPE": [1, 1]
"SEED": 42

"FREEZE_ALTERNATION": 10
"DETECTION_LOSS_COEF": 0.5
"PCGRAD_ENABLED": true
"NORMALIZE_REWARDS": true
"CHECKPOINT_EVERY": 50
"REGIME_LABELS_PATH": "regime_labels.json"
"WINDOW_TO_DATE_PATH": "window_to_date_2024_test.json"

"ENV_CONFIG": "config/env_configs/adversarial_mm_cluster_config2.json"

"TimePeriod": "2024_test"

"ENTITY": "your-wandb-entity"
"PROJECT": "v1_config1_baseline"
"WANDB_MODE": "disabled"
