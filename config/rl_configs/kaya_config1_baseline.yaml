# ============================================================================
# PRODUCTION ARM — Config 1 (BASELINE): vanilla IPPO market maker, no attack.
#
# Proposal §4 agent configurations: (1) baseline, (2) adversarial co-trained,
# (3) full model. This arm trains the MM with the telegraph gate pinned OFF and
# a zero adversary budget (adversarial_mm_cluster_config1.json), detection head
# and regime/detection obs channels disabled — the clean-market floor for the
# 1-vs-2 contrast. The adversary still occupies its phase-0 updates (learning
# nothing) so the MM receives the SAME number of updates as in arms 2/3.
#
# Launch (20-seed chained sweep):   ./submit_chain.sh kaya_config1_baseline
# Resume after wall-kill:           resubmit the same phase (checkpoint resume;
#                                   completed phases exit immediately).
#
# CHAINED TRAINING (decision 2026-07-16: use ALL of Jan-Sep 2024). The full
# train pool is ~22 GB int32 on-device and cannot fit a 16 GB V100, so each
# seed trains as a resumed chain over quarter caches (~7-9 GB each):
#   Q1: updates 0-333 -> Q2: 334-667 -> Q3: 668-1001   (334 x 3 = 1002 updates)
# This yaml carries the PHASE-1 (Q1) values; slurm_sweep.sh overrides
# TimePeriod / WINDOW_TO_DATE_PATH / TOTAL_TIMESTEPS for q2/q3.
# ANNEAL_TOTAL_UPDATES pins the LR anneal to the full 1002-update chain.
# Methodology note: quarters are seen in calendar order (a curriculum), not
# sampled uniformly over Jan-Sep — identical across arms, so contrasts hold.
# Sizing: ~68 s/update (V100, 16 envs x 512 steps) => ~6.3h per phase.
# ============================================================================

# List-valued params are per-agent-type: index 0 = AdversarialMM, index 1 = Spoofing
"LR": [0.0003, 0.0003]
"NUM_ENVS": 16
"NUM_STEPS": 512
"GRU_HIDDEN_DIM": 256          # dummy hidden dim for MLP pass-through carry
"FC_DIM_SIZE": 256
"TOTAL_TIMESTEPS": 2736128     # PHASE 1 (Q1) budget: 334 updates; q2/q3 phases override
"ANNEAL_TOTAL_UPDATES": 1002   # LR anneal spans the whole Q1->Q2->Q3 chain
"UPDATE_EPOCHS": 4
"NUM_MINIBATCHES": 4
"GAMMA": [0.999, 0.99]         # MM 0.999 (validated 2026-06-26 stability run); ADV 0.99
"GAE_LAMBDA": [0.85, 0.95]
"CLIP_EPS": 0.2
"SCALE_CLIP_EPS": [false, false]
"ENT_COEF": [0.01, 0.01]
"VF_COEF": [0.5, 0.5]
"MAX_GRAD_NORM": [0.5, 0.5]
"ANNEAL_LR": [true, true]
"NUM_AGENTS_PER_TYPE": [1, 1]
"SEED": 42                     # overridden per job: SEED=${SLURM_ARRAY_TASK_ID}

# Adversarial-specific (detection/PCGrad inert in this arm: use_detection_head
# is false in the env config, so the BCE branch is skipped entirely)
"FREEZE_ALTERNATION": 10
"DETECTION_LOSS_COEF": 0.5
"PCGRAD_ENABLED": true
"NORMALIZE_REWARDS": true
"CHECKPOINT_EVERY": 50
# Regime labels are loaded for logging/eval splits in every arm; the MM's
# regime obs channel is only active in config 3 (regime_conditioning flag).
"REGIME_LABELS_PATH": "regime_labels.json"
"WINDOW_TO_DATE_PATH": "window_to_date_2024_q1.json"   # phase 1; overridden per phase

"ENV_CONFIG": "config/env_configs/adversarial_mm_cluster_config1.json"

"TimePeriod": "2024_q1"        # phase 1; slurm_sweep.sh overrides for q2/q3

"ENTITY": "your-wandb-entity"
"PROJECT": "v1_config1_baseline"
"WANDB_MODE": "disabled"
